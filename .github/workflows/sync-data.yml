name: Sync Data from Main Repo

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone main repo and copy data
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          echo "Token length: ${#PAT}"
          git clone https://oauth2:${PAT}@github.com/tomx-eth/megaarmy.git /tmp/main-repo
          cp /tmp/main-repo/frontend/src/data/customProjects.json data/
          cp /tmp/main-repo/frontend/src/data/fluffleProjects.json data/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: sync data from main repo"
            git push
          fi
