name: Update Project Data

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync Fluffle projects
        run: node scripts/sync-fluffle-projects.mjs || echo "Fluffle sync completed"

      - name: Update from OLI
        run: node scripts/update-project-metadata.mjs --auto || echo "OLI update completed"

      - name: Cleanup project names
        run: node scripts/cleanup-names.mjs || echo "Name cleanup completed"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: auto-update project data"
            git push
          fi
